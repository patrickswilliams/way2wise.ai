<style>
  :root{
    --cream:#FAF6EE;
    --navy:#16324F;
    --navy-soft:#2A4A6B;
    --coral:#E2703A;
    --gold:#B8923D;
    --charcoal:#2B2B2B;
    --line: rgba(22,50,79,0.16);
    --card: #FFFFFF;
  }
  *{box-sizing:border-box;}
  .wrap{
    font-family:'Inter',sans-serif;
    color:var(--charcoal);
    background:transparent;
    max-width:560px;
    margin:0 auto;
    padding:24px 12px 48px;
  }
  .ticket{
    background:var(--card);
    border-radius:18px;
    box-shadow:0 1px 3px rgba(22,50,79,0.08), 0 12px 32px rgba(22,50,79,0.10);
    overflow:hidden;
    position:relative;
  }
  .ticket-head{
    background:var(--navy);
    color:var(--cream);
    padding:28px 28px 22px;
    position:relative;
  }
  .brand-logo{
    width:52px;
    height:52px;
    border-radius:50%;
    display:block;
    margin-bottom:12px;
    box-shadow:0 0 0 2px rgba(250,246,238,0.25);
  }
  .eyebrow{
    font-size:11px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:600;
    margin:0 0 6px;
  }
  .title{
    font-family:'Fraunces',serif;
    font-size:30px;
    font-weight:700;
    line-height:1.1;
    margin:0 0 8px;
  }
  .subtitle{
    font-size:14px;
    color:rgba(250,246,238,0.78);
    margin:0;
  }
  .perforation{
    position:relative;
    height:0;
    border-top:2px dashed rgba(22,50,79,0.22);
    margin:0;
  }
  .perforation::before, .perforation::after{
    content:'';
    position:absolute;
    top:-11px;
    width:22px;
    height:22px;
    border-radius:50%;
    background:var(--cream);
  }
  .perforation::before{ left:-11px; }
  .perforation::after{ right:-11px; }
  .body{ padding:26px 28px 30px; }
  .field{ margin-bottom:20px; }
  label.field-label{
    display:block;
    font-size:12px;
    font-weight:600;
    letter-spacing:.04em;
    text-transform:uppercase;
    color:var(--navy-soft);
    margin-bottom:8px;
  }
  input[type=text]{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1.5px solid var(--line);
    font-family:'Inter',sans-serif;
    font-size:15px;
    color:var(--charcoal);
    background:#FBFAF7;
  }
  input[type=text]:focus{ outline:2px solid var(--coral); outline-offset:1px; border-color:var(--coral); }
  .yn{ display:flex; gap:10px; }
  .yn button{
    flex:1;
    padding:12px 10px;
    border-radius:10px;
    border:1.5px solid var(--line);
    background:#FBFAF7;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    color:var(--navy);
    transition:all .15s ease;
  }
  .yn button.active{
    background:var(--navy);
    border-color:var(--navy);
    color:var(--cream);
  }
  .venues{ display:flex; flex-direction:column; gap:16px; }
  .hood-label{
    font-family:'Fraunces',serif;
    font-size:13px;
    font-weight:600;
    color:var(--coral);
    margin:0 0 8px;
  }
  .venue-opt{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 12px;
    border-radius:10px;
    border:1.5px solid var(--line);
    margin-bottom:8px;
    cursor:pointer;
    background:#FBFAF7;
    transition:all .15s ease;
  }
  .venue-opt:hover{ border-color:var(--coral); }
  .venue-opt.picked{
    border-color:var(--coral);
    background:rgba(226,112,58,0.08);
  }
  .venue-opt input{ accent-color:var(--coral); width:16px; height:16px; flex-shrink:0; margin-top:2px; }
  .venue-info{ display:flex; flex-direction:column; gap:2px; }
  .venue-name{ font-size:14.5px; font-weight:500; }
  .venue-meta{ font-size:12px; color:rgba(43,43,43,0.6); }
  .venue-meta a{ color:var(--navy-soft); text-decoration:underline; }
  .venue-meta a:hover{ color:var(--coral); }
  .submit-btn{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    background:var(--coral);
    color:#fff;
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:.01em;
    cursor:pointer;
    margin-top:6px;
    transition:transform .1s ease, opacity .15s ease;
  }
  .submit-btn:hover{ opacity:.92; }
  .submit-btn:active{ transform:scale(0.99); }
  .submit-btn:disabled{ opacity:.5; cursor:not-allowed; }
  .msg{
    text-align:center;
    font-size:13px;
    margin-top:12px;
    min-height:16px;
    color:var(--navy-soft);
  }
  .toggle-row{
    display:flex;
    justify-content:center;
    margin-top:18px;
  }
  .toggle-link{
    font-size:13px;
    color:var(--navy-soft);
    text-decoration:underline;
    cursor:pointer;
    background:none;
    border:none;
    font-family:'Inter',sans-serif;
  }
  .results{
    background:var(--card);
    border-radius:18px;
    box-shadow:0 1px 3px rgba(22,50,79,0.08), 0 12px 32px rgba(22,50,79,0.10);
    padding:26px 28px 28px;
    margin-top:20px;
  }
  .results-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:18px;
  }
  .results-title{
    font-family:'Fraunces',serif;
    font-size:20px;
    font-weight:700;
    color:var(--navy);
    margin:0;
  }
  .headcount{
    font-family:'Fraunces',serif;
    font-size:15px;
    color:var(--coral);
    font-weight:600;
  }
  .bar-row{ margin-bottom:14px; }
  .bar-label{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    font-weight:500;
    margin-bottom:5px;
    color:var(--charcoal);
  }
  .bar-track{
    height:10px;
    background:rgba(22,50,79,0.08);
    border-radius:6px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    background:linear-gradient(90deg, var(--navy), var(--coral));
    border-radius:6px;
    transition:width .4s ease;
  }
  .empty-note{
    font-size:13.5px;
    color:var(--navy-soft);
    text-align:center;
    padding:8px 0;
  }
  .names-note{
    font-size:12px;
    color:rgba(43,43,43,0.55);
    margin-top:16px;
    line-height:1.5;
  }
</style>

      <p class="eyebrow">ODAF Graduates Brunch</p>
      <h1 class="title">Where to, and who's in?</h1>
      <p class="subtitle">A different get-together from the big party &mdash; a smaller brunch for 7. Tell us if you're coming and which spot you'd pick.</p>
    </div>
    <div class="perforation"></div>
    <div class="body">
      <div class="field">
        <label class="field-label" for="nameInput">Your name</label>
        <input type="text" id="nameInput" placeholder="e.g. Jordan Lee" autocomplete="off">
      </div>
      <div class="field">
        <label class="field-label">Are you coming?</label>
        <div class="yn">
          <button type="button" id="btnYes" onclick="setAttending(true)">Yes, I'm in</button>
          <button type="button" id="btnNo" onclick="setAttending(false)">Can't make it</button>
        </div>
      </div>
      <div class="field" id="venueField" style="display:none;">
        <label class="field-label">Pick your spot</label>
        <div class="venues" id="venueList"></div>
      </div>
      <button class="submit-btn" id="submitBtn" onclick="submitRSVP()" disabled>Submit RSVP</button>
      <p class="msg" id="msgArea"></p>
      <div class="toggle-row">
        <button class="toggle-link" onclick="toggleResults()" id="toggleBtn">See live results</button>
      </div>
    </div>
  </div>

  <div class="results" id="resultsPanel" style="display:none;">
    <div class="results-head">
      <h2 class="results-title">Live tally</h2>
      <span class="headcount" id="headcountLabel">0 coming</span>
    </div>
    <div id="venueBars"></div>
    <p class="empty-note" id="emptyNote" style="display:none;">No RSVPs yet &mdash; be the first!</p>
    <p class="names-note" id="namesNote"></p>
  </div>
</div>

<script>
const VENUES = [
  { hood: "Downtown LA", options: [
    { name: "Sincerely Yours", phone: "(213) 573-4548", site: "sincerelyyours.la", url: "https://www.sincerelyyours.la/" },
    { name: "Perch", phone: "(213) 802-1770", site: "perchla.com", url: "https://www.perchla.com/" },
    { name: "Settecento DTLA", phone: "(213) 757-7765", site: "settecentodtla.com", url: "https://www.settecentodtla.com/" }
  ]},
  { hood: "Santa Monica", options: [
    { name: "The Courtyard Kitchen", phone: "(310) 587-2333", site: "courtyardkitchenla.com", url: "https://www.courtyardkitchenla.com/" },
    { name: "\u00c9lephante", phone: "(424) 320-2384", site: "elephanterestaurants.com", url: "https://www.elephanterestaurants.com/" }
  ]},
  { hood: "Culver City", options: [
    { name: "Hatchet Hall", phone: "(310) 391-4222", site: "hatchethallla.com", url: "https://www.hatchethallla.com/" },
    { name: "Father's Office", phone: "(310) 736-2224", site: "fathersoffice.com", url: "https://fathersoffice.com/" }
  ]}
];

let attending = null;
let selectedVenue = null;

function renderVenueList(){
  const list = document.getElementById('venueList');
  list.innerHTML = '';
  VENUES.forEach(group => {
    const label = document.createElement('p');
    label.className = 'hood-label';
    label.textContent = group.hood;
    list.appendChild(label);
    group.options.forEach(v => {
      const opt = document.createElement('label');
      opt.className = 'venue-opt';
      opt.id = 'opt-' + v.name;
      opt.innerHTML = `
        <input type="radio" name="venue" value="${v.name}">
        <span class="venue-info">
          <span class="venue-name">${v.name}</span>
          <span class="venue-meta">${v.phone} &middot; <a href="${v.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${v.site}</a></span>
        </span>`;
      opt.querySelector('input').addEventListener('change', () => selectVenue(v.name));
      opt.addEventListener('click', (e) => {
        if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'A'){
          opt.querySelector('input').checked = true;
          selectVenue(v.name);
        }
      });
      list.appendChild(opt);
    });
  });
}
renderVenueList();

function selectVenue(name){
  selectedVenue = name;
  document.querySelectorAll('.venue-opt').forEach(el => el.classList.remove('picked'));
  document.getElementById('opt-' + name).classList.add('picked');
  updateSubmitState();
}

function setAttending(val){
  attending = val;
  document.getElementById('btnYes').classList.toggle('active', val === true);
  document.getElementById('btnNo').classList.toggle('active', val === false);
  document.getElementById('venueField').style.display = val ? 'block' : 'none';
  if(!val){ selectedVenue = null; }
  updateSubmitState();
}

function updateSubmitState(){
  const name = document.getElementById('nameInput').value.trim();
  const btn = document.getElementById('submitBtn');
  let ok = name.length > 0 && attending !== null;
  if(attending === true && !selectedVenue) ok = false;
  btn.disabled = !ok;
}
document.getElementById('nameInput').addEventListener('input', updateSubmitState);

async function submitRSVP(){
  const name = document.getElementById('nameInput').value.trim();
  const msg = document.getElementById('msgArea');
  const btn = document.getElementById('submitBtn');
  if(!name || attending === null){ return; }
  btn.disabled = true;
  msg.textContent = 'Saving...';
  const entry = {
    name,
    attending,
    venue: attending ? selectedVenue : null,
    ts: Date.now()
  };
  const key = 'entries:' + name.toLowerCase().replace(/\s+/g, '_');
  try{
    const result = await window.storage.set(key, JSON.stringify(entry), true);
    if(result){
      msg.textContent = attending ? `Thanks, ${name} \u2014 you're locked in!` : `Thanks for letting us know, ${name}.`;
      await loadResults();
      if(document.getElementById('resultsPanel').style.display === 'none'){
        toggleResults();
      }
    } else {
      msg.textContent = 'Something went wrong saving your RSVP \u2014 try again?';
      btn.disabled = false;
    }
  } catch(err){
    msg.textContent = 'Something went wrong saving your RSVP \u2014 try again?';
    btn.disabled = false;
  }
}

async function toggleResults(){
  const panel = document.getElementById('resultsPanel');
  const btn = document.getElementById('toggleBtn');
  const showing = panel.style.display !== 'none';
  if(showing){
    panel.style.display = 'none';
    btn.textContent = 'See live results';
  } else {
    panel.style.display = 'block';
    btn.textContent = 'Hide results';
    await loadResults();
  }
}

async function loadResults(){
  const headcountLabel = document.getElementById('headcountLabel');
  const barsEl = document.getElementById('venueBars');
  const emptyNote = document.getElementById('emptyNote');
  const namesNote = document.getElementById('namesNote');
  barsEl.innerHTML = '';
  try{
    const listResult = await window.storage.list('entries:', true);
    const keys = (listResult && listResult.keys) ? listResult.keys : [];
    if(keys.length === 0){
      headcountLabel.textContent = '0 coming';
      emptyNote.style.display = 'block';
      namesNote.textContent = '';
      return;
    }
    emptyNote.style.display = 'none';
    const entries = [];
    for(const k of keys){
      try{
        const r = await window.storage.get(k, true);
        if(r && r.value){ entries.push(JSON.parse(r.value)); }
      } catch(e){ /* skip missing/broken entries */ }
    }
    const coming = entries.filter(e => e.attending);
    headcountLabel.textContent = `${coming.length} coming`;

    const tally = {};
    VENUES.forEach(g => g.options.forEach(v => tally[v.name] = 0));
    coming.forEach(e => { if(e.venue && tally.hasOwnProperty(e.venue)) tally[e.venue]++; });

    const maxVotes = Math.max(1, ...Object.values(tally));
    VENUES.forEach(group => {
      group.options.forEach(v => {
        const count = tally[v.name];
        const pct = Math.round((count / maxVotes) * 100);
        const row = document.createElement('div');
        row.className = 'bar-row';
        row.innerHTML = `
          <div class="bar-label"><span>${v.name}</span><span>${count}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${count > 0 ? pct : 0}%"></div></div>
        `;
        barsEl.appendChild(row);
      });
    });

    const comingNames = coming.map(e => e.name).join(', ');
    namesNote.textContent = comingNames ? `Coming: ${comingNames}` : '';
  } catch(err){
    headcountLabel.textContent = '\u2013';
    emptyNote.style.display = 'block';
    emptyNote.textContent = 'Could not load results right now.';
  }
}
</script>
